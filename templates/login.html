<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות | דשבורד תגבורים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #f0f2f8;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { font-family: 'Heebo', sans-serif; box-sizing: border-box; }
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .login-wrapper { width: 100%; max-width: 420px; }
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-header .icon-circle {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: white;
            margin-bottom: 0.75rem;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        .login-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin: 0 0 0.25rem; }
        .login-header p { color: var(--text-muted); font-size: 0.95rem; margin: 0; }
        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }
        .form-control {
            width: 100%; padding: 0.7rem 0.9rem;
            border: 1px solid var(--border); border-radius: 10px;
            background: white; font-size: 1rem;
            font-family: 'Heebo', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .form-label { font-weight: 600; color: var(--text); margin-bottom: 0.35rem; }
        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; border: none; border-radius: 12px;
            font-weight: 600; font-size: 1.05rem; padding: 0.75rem; width: 100%;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.35);
        }
        .btn-login:disabled { opacity: 0.7; transform: none; cursor: not-allowed; }
        .btn-login .spinner {
            display: inline-block;
            width: 1.1rem; height: 1.1rem;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-left: 2.75rem;
        }
        .toggle-password {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: var(--primary); }
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        @media (max-width: 576px) {
            body { padding: 1rem 0.5rem; }
            .login-card { padding: 1.25rem; border-radius: 16px; }
            .form-control { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="icon-circle"><i class="bi bi-shield-lock-fill"></i></div>
            <h1>דשבורד תגבורים</h1>
            <p>הכניסו סיסמה כדי לגשת למערכת הניהול</p>
        </div>
        <div class="login-card">
            {% if error %}
            <div class="alert-error"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST" id="login-form">
                <div class="mb-3">
                    <label class="form-label" for="password">סיסמה</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" name="password" placeholder="הכניסו סיסמה..." required autofocus>
                        <button type="button" class="toggle-password" onclick="togglePass()" title="הצג/הסתר סיסמה">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="login-btn">
                    <i class="bi bi-box-arrow-in-left"></i> כניסה
                </button>
            </form>
        </div>
    </div>
<script>
function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.querySelector('.toggle-password');
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
    } else {
        inp.type = 'password';
        btn.textContent = '👁️';
    }
    inp.focus();
}
document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מתחבר...';
});
</script>
</body>
</html>
